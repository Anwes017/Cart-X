server:
  port: 8081

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  # =====================================================
  # SPRING CLOUD GATEWAY ROUTES
  # =====================================================
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - "Authorization"
            allowCredentials: true
      default-filters:
        # Apply rate limiting filter globally
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 5     # requests per second
            redis-rate-limiter.burstCapacity: 10
            key-resolver: "#{@jwtUserKeyResolver}"

      routes:

        # ---------------- AUTH SERVICE (PUBLIC) ----------------
        - id: auth-service
          uri: http://localhost:8080
          predicates:
            - Path=/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authServiceCB
                fallbackUri: forward:/fallback/auth

        # ---------------- PRODUCT SERVICE ----------------
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/products/**
          filters:
            - name: CircuitBreaker
              args:
                name: productServiceCB
                fallbackUri: forward:/fallback/product

        - id: cart-service
          uri: http://localhost:8083
          predicates:
              - Path=/cart/**
          filters:
              - name: CircuitBreaker
                args:
                  name: cartCB
                  fallbackUri: forward:/fallback/cart

        # ---------------- ORDER SERVICE ----------------
        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/orders/**
          filters:
            - name: CircuitBreaker
              args:
                name: orderServiceCB
                fallbackUri: forward:/fallback/order

        # ---------------- PAYMENT SERVICE ----------------
        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/payments/**
          filters:
            - name: CircuitBreaker
              args:
                name: paymentServiceCB
                fallbackUri: forward:/fallback/payment

        # ---------------- NOTIFICATION SERVICE ----------------
        - id: notification-service
          uri: http://localhost:8086
          predicates:
            - Path=/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notificationServiceCB
                fallbackUri: forward:/fallback/notification

  # =====================================================
  # JWT CONFIG (SAME SECRET AS AUTH SERVICE)
  # =====================================================
  jwt:
    secret: ${JWT_SECRET:change-me-in-local-env}

  # =====================================================
  # REDIS CONFIG (RATE LIMITING + FUTURE CACHE)
  # =====================================================
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

# =====================================================
# RESILIENCE4J – CIRCUIT BREAKERS
# =====================================================
resilience4j:
  circuitbreaker:
    instances:

      authServiceCB:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

      productServiceCB:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

      orderServiceCB:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

      paymentServiceCB:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

      notificationServiceCB:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

# =====================================================
# ACTUATOR
# =====================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info
